name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEPLOY_TARGET: github-pages
  NEXT_PUBLIC_DISABLE_NETLIFY_FORMS: "true"
  NEXT_PUBLIC_PRIMARY_SITE_URL: https://repokajian.netlify.app
  NEXT_PUBLIC_PUBLIC_SITE_URL: https://repokajian.netlify.app
  NEXT_PUBLIC_BASE_PATH: /vibathon-2026
  NEXT_PUBLIC_REPO_OWNER: t-onluring
  NEXT_PUBLIC_REPO_NAME: vibathon-2026

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build:pages

      - name: Add Jekyll opt-out
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
